<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      app.requireAuth(['Student']);
      app.loadResources('resource-list');
      app.loadMyRequests('my-requests');
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Student Dashboard</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/request.html">New Request</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/history.html">History</a>
    </nav>

    <div class="layout-two-col">
      <section>
        <div class="card">
          <h3>Available Resources</h3>
          <p class="card-subtitle">Select a resource to view details or start a booking request.</p>
          <div id="resource-list" class="grid"></div>
        </div>
      </section>

      <aside>
        <div class="card">
          <h3>My Bookings</h3>
          <p class="card-subtitle">Track the status of your recent requests here.</p>
          <div id="my-requests"></div>
        </div>
      </aside>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
