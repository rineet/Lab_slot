<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      app.requireAuth(['Admin']);
      app.loadUsers('user-table');
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>User Administration</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/admin-dashboard.html">Dashboard</a>
      <a href="/manage-resources.html">Resources</a>
    </nav>

    <div class="card">
      <h3>Directory Management</h3>
      <p class="card-subtitle">Control user roles and system access status.</p>
      <div id="user-table"></div>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
