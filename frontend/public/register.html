<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
</head>

<body>
  <div class="shell auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center; margin-bottom: 24px;">
        <div
          style="width: 48px; height: 48px; background: #eef2ff; color: var(--primary); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            style="width: 24px; height: 24px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5L12 14.5L5 7.5" />
          </svg>
        </div>
        <h2>Create Account</h2>
        <p class="subtitle">Join the university research lab community</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input name="name" type="text" required placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input name="email" type="email" required placeholder="your.email@university.edu" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role" required>
            <option value="Student">Student</option>
            <option value="Faculty">Faculty</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <button type="submit">Create Account</button>
      </form>
      <div id="register-msg" style="margin-top: 16px; text-align: center; font-size: 0.875rem;"></div>

      <div style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
        Already have an account? <a href="/login.html"
          style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a>
      </div>
      <div style="margin-top: 12px; text-align: center;">
        <a href="/index.html" style="font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">&larr; Back
          to Home</a>
      </div>
    </div>
  </div>
</body>

</html>
