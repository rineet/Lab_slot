<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approvals - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await app.requireAuth();
      if (user) document.querySelector('nav').innerHTML = app.buildNav(user.role);
      await app.requireAuth(['Faculty', 'Admin']);
      app.loadFacultyPending('pending-list');
      app.highlightActiveNav();
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Pending Approvals</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/faculty-dashboard.html">Dashboard</a>
      <a href="/approvals.html">Approvals</a>
      <a href="/calendar.html">Resource Calendar</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <div class="card">
      <h3>Review Queue</h3>
      <p class="card-subtitle">Manage upcoming lab requests and approve or reject based on research requirements.</p>
      <div id="pending-list" class="grid"></div>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
