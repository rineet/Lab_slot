<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Resources - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      app.requireAuth(['Student', 'Faculty', 'Admin']);
      app.loadResources('resource-list');
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Available Resources</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="#" onclick="history.back(); return false;">&larr; Back</a>
      <a href="/calendar.html">View Schedule</a>
    </nav>

    <div class="card">
      <h3>Explore Facilities</h3>
      <p class="card-subtitle">Browse through our state-of-the-art labs and high-performance equipment.</p>
      <div id="resource-list" class="grid"></div>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
