<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
</head>

<body>
  <div class="shell auth-wrapper">
    <div class="auth-card">
      <div style="text-align:center; margin-bottom: 24px;">
        <div style="width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary-light), #e0f2fe); color: var(--primary); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 28px; height: 28px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <h2>Lab Booking Portal</h2>
        <p class="subtitle">Secure login to your account</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input name="email" type="email" required placeholder="your.email@university.edu" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required placeholder="••••••••" />
        </div>
        <button type="submit" style="margin-bottom: 16px;">Sign In</button>
      </form>
      <div id="login-msg" style="margin-top: 12px; text-align: center; font-size: 0.875rem;"></div>

      <div style="margin-top: 24px; text-align: center;">
        <a href="/index.html" style="font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">← Back to Home</a>
      </div>
    </div>
  </div>
</body>

</html>
