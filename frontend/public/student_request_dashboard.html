<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Document Requests</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await app.requireAuth();
      // build role-specific navigation
      if (user) document.querySelector('nav').innerHTML = app.buildNav(user.role);
      await app.requireAuth(['Student']);
      app.loadResources('resource-list');
      app.loadMyRequests('my-requests');
      app.handleChangePasswordForm('change-password-form', 'change-password-msg');
      app.highlightActiveNav();
    });
  </script>
<body>
  <div class="shell">
    <header>
      <h2>My Document Requests</h2>
      <div>
        <span id="user-badge" class="muted"></span>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/student-dashboard.html">Dashboard</a>
      <a href="/request.html">New Request</a>
      <a href="/request_form.html">Doc Approval Form</a>
      <a href="/student_request_dashboard.html">Doc Approval Status</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/history.html">Bookings History</a>
      <a href="/attendance.html">My Attendance</a>
      <a href="/marks.html">My Marks</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <section class="card">
      <h3>Status Tracker</h3>
      <div id="student-requests-table"></div>
    </section>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/document-approval.js"></script>
</body>
</html>
