<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Login - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
</head>

<body class="role-login-page faculty-login-page">
  <div class="shell auth-wrapper auth-shell">
    <section class="role-login-layout">
      <div class="auth-card role-auth-card">
        <div class="auth-card-header">
          <div class="auth-role-pills"><span>Faculty Access</span></div>
          <h2>Faculty Sign In</h2>
          <p class="subtitle">Use your faculty credentials to continue.</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="faculty-login-email">Email Address</label>
            <input id="faculty-login-email" name="email" type="email" required maxlength="120"
              autocomplete="username" placeholder="faculty@university.edu"
              pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="Enter a valid email address like name@university.edu" />
          </div>
          <div class="form-group">
            <label for="faculty-login-password">Password</label>
            <input id="faculty-login-password" name="password" type="password" required
              autocomplete="current-password" placeholder="Enter your password" />
          </div>
          <button type="submit" class="auth-submit-btn">Enter Faculty Portal</button>
        </form>

        <div id="login-msg" class="auth-message"></div>
        <div class="auth-footer-link">
        <a href="/index.html">back</a>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
