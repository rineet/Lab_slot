<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Request Form</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await app.requireAuth();
      // build role-specific navigation
      if (user) document.querySelector('nav').innerHTML = app.buildNav(user.role);
      await app.requireAuth(['Student']);
      app.loadResources('resource-list');
      app.loadMyRequests('my-requests');
      app.handleChangePasswordForm('change-password-form', 'change-password-msg');
      app.highlightActiveNav();
    });
  </script>
<body>
  <div class="shell">
    <header>
      <h2>Document Approval Request</h2>
      <div>
        <span id="user-badge" class="muted"></span>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/student-dashboard.html">Dashboard</a>
      <a href="/request.html">New Request</a>
      <a href="/request_form.html">Doc Approval Form</a>
      <a href="/student_request_dashboard.html">Doc Approval Status</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/history.html">Bookings History</a>
      <a href="/attendance.html">My Attendance</a>
      <a href="/marks.html">My Marks</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <section class="card">
      <h3>Submit New Approval Request</h3>
      <form id="request-form" enctype="multipart/form-data">
        <div class="form-grid two-cols">
          <div>
            <label for="studentName">Student Name</label>
            <input id="studentName" name="name" type="text" placeholder="Auto-filled from login" />
          </div>
          <div>
            <label for="to">To (Professor/Admin)</label>
            <select id="to" name="to" required></select>
          </div>
          <div>
            <label for="cc">CC (optional)</label>
            <div class="recipient-picker">
              <select id="cc" name="cc"></select>
              <button type="button" id="add-cc-recipient" class="secondary">Add</button>
            </div>
            <div id="cc-selected" class="selected-recipients muted">No CC recipients added.</div>
          </div>
          <div>
            <label for="bcc">BCC (optional)</label>
            <div class="recipient-picker">
              <select id="bcc" name="bcc"></select>
              <button type="button" id="add-bcc-recipient" class="secondary">Add</button>
            </div>
            <div id="bcc-selected" class="selected-recipients muted">No BCC recipients added.</div>
          </div>
          <div>
            <label for="subject">Subject</label>
            <input id="subject" name="subject" type="text" required />
          </div>
        </div>

        <label for="shortMessage">Short Message</label>
        <textarea id="shortMessage" name="shortMessage" rows="3" placeholder="Optional note for recipient"></textarea>

        <div class="request-upload-group">
          <label for="document">Upload PDF Document</label>
          <input id="document" name="document" type="file" accept="application/pdf,.pdf" required />
        </div>

        <div id="request-submit-progress" class="request-submit-progress" aria-hidden="true">
          <div class="request-submit-progress-bar"></div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Request</button>
      </form>
      <p id="request-form-msg" class="muted"></p>
    </section>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/document-approval.js"></script>
</body>
</html>
