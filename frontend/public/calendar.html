<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Calendar - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await app.requireAuth();
      // build role-specific navigation
      if (user) document.querySelector('nav').innerHTML = app.buildNav(user.role);

      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: [],
        eventClick: (info) => {
          alert(
            'Lab: ' + info.event.title + '\n' +
            'Status: ' + info.event.extendedProps.status + '\n' +
            'Booked by: ' + (info.event.extendedProps.bookedBy || 'Unknown') + '\n' +
            'Attendees: ' + (info.event.extendedProps.attendees ?? '-') + '\n' +
            'Capacity: ' + (info.event.extendedProps.capacity ?? '-')
          );
        },
        themeSystem: 'standard'
      });
      calendar.render();
      window.calendar = calendar;

      await app.populateResourceSelect('resourceId');
      onResourceChange();
      app.highlightActiveNav();
    });

    function onResourceChange() {
      const rid = document.getElementById('resourceId').value;
      if (rid) {
        app.loadResourceCalendar(rid);
      }
    }
  </script>
  <style>
    :root {
      --fc-button-bg-color: var(--primary);
      --fc-button-border-color: var(--primary);
      --fc-button-hover-bg-color: var(--primary-hover);
      --fc-button-active-bg-color: var(--primary-hover);
    }

    .fc .fc-toolbar-title {
      font-size: 1.25rem;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Resource Schedule</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/student-dashboard.html">Dashboard</a>
      <a href="/request.html">New Request</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/history.html">Bookings History</a>
      <a href="/attendance.html">My Attendance</a>
      <a href="/marks.html">My Marks</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <div class="card">
      <div class="form-group" style="max-width: 400px; margin-bottom: 0;">
        <label>Select Resource to View</label>
        <select id="resourceId" onchange="onResourceChange()">
          <option value="">-- Select a Resource --</option>
        </select>
      </div>
    </div>

    <div class="card" style="padding: 24px;">
      <div id='calendar'></div>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
