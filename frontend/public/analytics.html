<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics - CampusFlow</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await app.requireAuth(['Admin']);
      app.loadVenueUtilization('venue-utilization');
      app.loadFacultyWorkload('faculty-workload');
      app.highlightActiveNav();
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Analytics</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/admin-dashboard.html">Dashboard</a>
      <a href="/manage-resources.html">Resources</a>
      <a href="/manage-users.html">Users</a>
      <a href="/manage-hierarchy.html">Hierarchy</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <div class="card">
      <h3>Venue Utilization</h3>
      <p class="card-subtitle">Total approved booked hours per venue.</p>
      <div id="venue-utilization"></div>
    </div>

    <div class="card">
      <h3>Faculty Workload</h3>
      <p class="card-subtitle">Number of approved bookings per faculty.</p>
      <div id="faculty-workload"></div>
    </div>
  </div>
</body>

</html>
