<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Hierarchy - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await app.requireAuth(['Admin']);
      app.loadFacultyHierarchy('faculty-hierarchy-table');
      app.highlightActiveNav();
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Faculty Hierarchy</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/admin-dashboard.html">Dashboard</a>
      <a href="/manage-resources.html">Resources</a>
      <a href="/manage-users.html">Users</a>
      <a href="/manage-hierarchy.html">Hierarchy</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <div class="card">
      <h3>Hierarchy Assignments</h3>
      <p class="card-subtitle">Set Faculty hierarchy roles used for approval flow: Club Incharge → HOD → Associate Dean.</p>
      <div id="faculty-hierarchy-table"></div>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
