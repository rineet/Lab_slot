<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Resources - Lab Booking System</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await app.requireAuth(['Admin']);
      app.populateFacultySelect('resourceFaculty');
      app.handleCreateResourceForm();
      app.loadAdminResources('admin-resource-list');
      app.highlightActiveNav();
    });
  </script>
</head>

<body>
  <div class="shell">
    <header>
      <h2>Manage Resources</h2>
      <div id="user-info">
        <span id="user-badge" class="muted" style="margin-right: 16px;"></span>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>
    </header>

    <nav>
      <a href="/index.html">Home</a>
      <a href="/admin-dashboard.html">Dashboard</a>
      <a href="/manage-resources.html">Resources</a>
      <a href="/manage-users.html">Users</a>
      <a href="/manage-hierarchy.html">Hierarchy</a>
      <a href="/calendar.html">Calendar</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/complaints.html">Complaints</a>
    </nav>

    <div class="layout-two-col">
      <section>
        <div class="card">
          <h3>Active Environment</h3>
          <p class="card-subtitle">List of labs and equipment currently deployed in the system.</p>
          <div id="admin-resource-list"></div>
        </div>
      </section>

      <aside>
        <div class="card">
          <h3>Provision New Resource</h3>
          <p class="card-subtitle">Add a new lab or high-performance asset.</p>
          <form id="resource-form">
            <div class="form-group">
              <label>Internal Name</label>
              <input type="text" name="name" required placeholder="e.g. Robotics Lab A" />
            </div>
            <div class="form-group">
              <label>Asset Type</label>
              <select name="type" required>
                <option value="Lab">Lab</option>
                <option value="GPU">GPU Cluster</option>
                <option value="Equipment">Specialized Equipment</option>
              </select>
            </div>
            <div class="form-group">
              <label>Strength (Capacity)</label>
              <input type="number" name="capacity" required placeholder="30" />
            </div>
            <div class="form-group">
              <label>Assigned Overseer (Faculty)</label>
              <select id="resourceFaculty" name="assignedFacultyId" required></select>
            </div>
            <div class="form-group">
              <label>Physical Location</label>
              <input type="text" name="location" required placeholder="e.g. Block C, Room 402" />
            </div>
            <div class="form-group">
              <label>Resource Description</label>
              <textarea name="description" placeholder="Technical specs or usage guidelines..."></textarea>
            </div>
            <div class="form-group">
              <label><input type="checkbox" name="requiresClubApproval" /> Requires club approval</label>
            </div>
            <button type="submit">Create Resource</button>
          </form>
          <div id="resource-msg" style="margin-top: 12px; font-size: 0.875rem;"></div>
        </div>
      </aside>
    </div>

    <footer>
      &copy; 2026 University Lab Booking System. All rights reserved.
    </footer>
  </div>
</body>

</html>
