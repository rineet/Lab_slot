<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professor Document Inbox</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await app.requireAuth();
      if (user) document.querySelector('nav').innerHTML = app.buildNav(user.role);
      await app.requireAuth(['Faculty']);
      app.highlightActiveNav();
    });
</script>
<body>
  <div class="shell">
    <header>
      <h2>Professor Approval Inbox</h2>
      <div>
        <span id="user-badge" class="muted"></span>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <nav>
      
    </nav>

    <section class="card">
      <h3>Incoming Requests</h3>
      <div id="professor-inbox"></div>
      <p id="professor-action-msg" class="muted"></p>
    </section>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/document-approval.js"></script>
</body>
</html>
